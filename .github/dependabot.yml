version: 2
updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: monthly
    groups:
      development-dependencies:
        dependency-type: development
      runtime-dependencies:
        dependency-type: production
        update-types:
        - minor
        - patch
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      actions:
        patterns:
          - "*"
  - package-ecosystem: pre-commit
    directory: /
    schedule:
      interval: monthly
    groups:
      hooks:
        patterns:
          - "*"
