[tox]
envlist = py39, py310, py311, py312
isolated_build = true
skip_missing_interpreters = true

[docker:sqlserver]
image = mcr.microsoft.com/mssql/server:2019-latest
expose =
    TAP_MSSQL_PORT=1433/tcp
environment =
    ACCEPT_EULA=y
    MSSQL_SA_PASSWORD=testDatabase1
    MSSQL_TCP_PORT=1433
healthcheck_cmd = /opt/mssql-tools18/bin/sqlcmd \
    -U SA -P $MSSQL_SA_PASSWORD \
    -No \
    -q "select 1"
healthcheck_timeout = 1
healthcheck_retries = 30
healthcheck_interval = 1
healthcheck_start_period = 30

[testenv]
docker = sqlserver
deps =
    pytest
    pytest-cov
setenv =
    APPDATA =
allowlist_externals =
    echo
commands =
    echo Docker Mapped Port 1433/tcp to {env:TAP_MSSQL_PORT}
    pytest --cov-report=xml:coverage-reports/coverage.xml --cov-report term-missing tests/test_tap_mssql.py

[testenv:mypy]
deps = mypy
commands = mypy --ignore-missing-imports tap_mssql/

[testenv:package]
skip_install = true
deps =
    build
    twine
commands =
    python3 -m build
    python3 -m twine check dist/*
